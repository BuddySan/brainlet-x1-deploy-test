# Brainlet → X1 deploy workflow. Brainlet commits this to the USER's repo as
# .github/workflows/deploy-x1.yml. It runs on the user's own free GitHub-hosted
# runner: builds their Anchor/SVM program and deploys it to X1.
#
# FUNDING: X1 testnet has NO programmatic airdrop/faucet API, so the deployer
# must be a PRE-FUNDED keypair the user supplies as the repo secret
# X1_DEPLOY_KEYPAIR (the JSON array from `solana-keygen new`). The user funds
# its address ONCE — testnet: https://faucet.testnet.x1.xyz/ , mainnet: real XNT.
# Non-custodial: the user's runner builds, the user's key signs, the user's gas pays.
# The Program ID is published to the run Summary AND as the `program-id` artifact.
name: Deploy to X1
on:
  workflow_dispatch:
    inputs:
      cluster:
        description: "X1 cluster to deploy to"
        type: choice
        options: [testnet, mainnet]
        default: testnet

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve RPC
        run: echo "X1_RPC=https://rpc.${{ inputs.cluster }}.x1.xyz" >> "$GITHUB_ENV"

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install Solana CLI 2.1.21
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version  # fail loudly if the install did not land

      - name: Install Anchor 0.30.1
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force \
            || cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.30.1
          avm use 0.30.1

      - name: Pin Rust 1.77.2 (SBF-compatible Cargo.lock v3)
        run: |
          rustup toolchain install 1.77.2 --profile minimal --no-self-update
          rustup default 1.77.2
          rm -f Cargo.lock   # regenerate as v3 with the pinned cargo

      - name: Configure deployer wallet (pre-funded keypair secret)
        run: |
          solana config set -u "$X1_RPC"
          if [ -z "${{ secrets.X1_DEPLOY_KEYPAIR }}" ]; then
            echo "::error::Add your FUNDED deploy keypair as the repo secret X1_DEPLOY_KEYPAIR (the JSON array printed by 'solana-keygen new'). Fund its address first — testnet: https://faucet.testnet.x1.xyz/ · mainnet: send XNT."
            exit 1
          fi
          printf '%s' '${{ secrets.X1_DEPLOY_KEYPAIR }}' > deployer.json
          solana config set -k deployer.json
          ADDR="$(solana address)"
          echo "Deployer address: $ADDR"
          BAL="$(solana balance 2>/dev/null || echo 0)"
          echo "Balance: $BAL"
          case "$BAL" in
            0\ *|0|"") echo "::error::Deployer $ADDR has no funds. Fund it (testnet faucet / mainnet XNT) then re-run."; exit 1 ;;
          esac

      - name: Build
        run: anchor build

      - name: Deploy
        run: |
          set -o pipefail
          # Deploy with the solana CLI directly (RPC + keypair already set via
          # `solana config`). Avoids anchor's custom-cluster Anchor.toml handling.
          solana program deploy target/deploy/*.so 2>&1 | tee deploy.log
          PID="$(grep -oE 'Program Id: [1-9A-HJ-NP-Za-km-z]+' deploy.log | awk '{print $3}' | tail -1)"
          if [ -z "$PID" ]; then PID="$(solana address -k target/deploy/*-keypair.json 2>/dev/null | head -1)"; fi
          if [ -z "$PID" ]; then echo "::error::Could not determine Program ID"; exit 1; fi
          echo "$PID" > program-id.txt
          echo "## ✅ Deployed Program ID" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$PID\` on X1 ${{ inputs.cluster }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Program ID: $PID"

      - name: Publish Program ID
        if: ${{ always() && hashFiles('program-id.txt') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: program-id
          path: program-id.txt
