# Brainlet → X1 deploy workflow. Brainlet commits this to the USER's repo as
# .github/workflows/deploy-x1.yml; it runs on the USER's free GitHub-hosted
# runner. Non-custodial: user's runner builds, user's key signs, user's gas pays.
#
# Toolchain = the PROVEN X1 combo (mirrors the gainspire anchor-ci recipe):
#   * agave/solana 2.1.0  -> platform-tools v1.43 -> target sbf-solana-solana
#     (X1-compatible). agave 2.2+ uses sbpf-solana-solana = X1-INCOMPATIBLE;
#     solana 1.18 hits the edition2024 wall. Pin 2.1.0 exactly.
#   * Anchor 0.31.1 (anchor-syn 0.31.1 — avoids the removed proc-macro2 API)
#   * host rust 1.82 (spl deps need lazy_cell>=1.80 + iter_repeat_n>=1.82); the
#     SBF .so is built by platform-tools' own bundled rustc 1.79.
#   * zeroize_derive pinned to 1.4.3 (1.5.0 needs edition2024 the SBF cargo lacks).
#
# FUNDING: X1 testnet has no programmatic faucet -> supply a PRE-FUNDED keypair
# as the repo secret X1_DEPLOY_KEYPAIR (fund its address: testnet
# https://faucet.testnet.x1.xyz/ , mainnet real XNT). Program ID -> run Summary
# + the `program-id` artifact.
name: Deploy to X1
on:
  workflow_dispatch:
    inputs:
      cluster:
        description: "X1 cluster"
        type: choice
        options: [testnet, mainnet]
        default: testnet

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve RPC
        run: echo "X1_RPC=https://rpc.${{ inputs.cluster }}.x1.xyz" >> "$GITHUB_ENV"

      - name: Install Rust (host stable — supports edition2024 for the dep-pin step)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version   # SBF .so is built by platform-tools' own rustc 1.79, not this

      - name: Install Solana / agave 2.1.0
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version   # fail loudly if install didn't land

      - name: Install Anchor 0.31.1 (prebuilt binary — avoids cargo-build edition2024)
        run: |
          set -euo pipefail
          ANCHOR_VER="0.31.1"
          ANCHOR_SHA256="5e5f8fc0f75f2c3dc5cceb082a7f735d09be2207540291ffad370eb5b2dc959b"
          ANCHOR_URL="https://github.com/coral-xyz/anchor/releases/download/v${ANCHOR_VER}/anchor-${ANCHOR_VER}-x86_64-unknown-linux-gnu"
          mkdir -p "$HOME/.avm/bin"
          curl -sSfL "$ANCHOR_URL" -o "$HOME/.avm/bin/anchor-${ANCHOR_VER}"
          echo "${ANCHOR_SHA256}  $HOME/.avm/bin/anchor-${ANCHOR_VER}" | sha256sum -c -
          cp "$HOME/.avm/bin/anchor-${ANCHOR_VER}" "$HOME/.avm/bin/anchor"
          chmod +x "$HOME/.avm/bin/anchor"
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.avm/bin:$PATH"
          anchor --version

      - name: Configure deployer wallet (pre-funded keypair secret)
        run: |
          solana config set -u "$X1_RPC"
          if [ -z "${{ secrets.X1_DEPLOY_KEYPAIR }}" ]; then
            echo "::error::Add your FUNDED deploy keypair as repo secret X1_DEPLOY_KEYPAIR (the JSON array from 'solana-keygen new'). Fund its address first — testnet: https://faucet.testnet.x1.xyz/ · mainnet: send XNT."
            exit 1
          fi
          printf '%s' '${{ secrets.X1_DEPLOY_KEYPAIR }}' > deployer.json
          solana config set -k deployer.json
          ADDR="$(solana address)"; echo "Deployer: $ADDR"
          BAL="$(solana balance 2>/dev/null || echo 0)"; echo "Balance: $BAL"
          case "$BAL" in 0\ *|0|"") echo "::error::Deployer $ADDR has no funds. Fund it then re-run."; exit 1 ;; esac

      - name: Pin edition2024-offending deps to SBF-buildable versions
        run: |
          cargo generate-lockfile || true
          cargo update -p cpufeatures --precise 0.2.17 || true
          cargo update -p zeroize_derive --precise 1.4.3 || true
          cargo update -p zeroize --precise 1.8.2 || true

      - name: Build (Anchor 0.31.1 -> sbf-solana-solana)
        run: anchor build

      - name: Deploy
        run: |
          set -o pipefail
          SO="$(ls target/deploy/*.so 2>/dev/null | head -1)"
          [ -z "$SO" ] && SO="$(ls target/sbf-solana-solana/release/*.so 2>/dev/null | head -1)"
          [ -z "$SO" ] && { echo "::error::no .so produced"; exit 1; }
          solana program deploy "$SO" 2>&1 | tee deploy.log
          PID="$(grep -oE 'Program Id: [1-9A-HJ-NP-Za-km-z]+' deploy.log | awk '{print $3}' | tail -1)"
          [ -z "$PID" ] && PID="$(solana address -k target/deploy/*-keypair.json 2>/dev/null | head -1)"
          [ -z "$PID" ] && { echo "::error::could not determine Program ID"; exit 1; }
          echo "$PID" > program-id.txt
          echo "## ✅ Deployed Program ID" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$PID\` on X1 ${{ inputs.cluster }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Program ID: $PID"

      - name: Publish Program ID
        if: ${{ always() && hashFiles('program-id.txt') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: program-id
          path: program-id.txt
